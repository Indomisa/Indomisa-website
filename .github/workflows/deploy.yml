name: Deploy Angular Website

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Angular App
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./indomisa-website

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: indomisa-website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Inject Web3Forms key
        run: |
          sed -i "s|__WEB3FORMS_ACCESS_KEY__|${{ secrets.WEB3FORMS_ACCESS_KEY }}|g" src/environments/environment.prod.ts
          grep -q "__WEB3FORMS_ACCESS_KEY__" src/environments/environment.prod.ts && exit 1 || echo "Secret placeholder replaced"

      - name: Build Angular app
        run: npm run build -- --configuration production --base-href /

      - name: Add CNAME
        run: echo "indomisa.it.com" > dist/indomisa-website/browser/CNAME

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: indomisa-website/dist/indomisa-website/browser

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4